<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue circle background -->
  <circle cx="16" cy="16" r="16" fill="#3b6f8d"/>

  <!-- Open book shape (white) -->
  <g fill="#ffffff">
    <!-- Left page -->
    <path d="M16 22 C16 22 9 20 6 20.5 L7.2 13.5 C10 13 15 14.5 16 15 Z"/>
    <!-- Right page -->
    <path d="M16 22 C16 22 23 20 26 20.5 L24.8 13.5 C22 13 17 14.5 16 15 Z"/>
    <!-- Book spine bottom -->
    <path d="M15 22.2 L16 15 L17 22.2 Q16 22.8 15 22.2Z"/>
  </g>

  <!-- Star/spark (yellow) centered above book -->
  <g fill="#f3d25b">
    <!-- 4-point star -->
    <polygon points="16,7 16.6,10.5 20,11 16.6,11.5 16,15 15.4,11.5 12,11 15.4,10.5" />
  </g>

  <!-- Two small sparkles (yellow) -->
  <g fill="#f3d25b">
    <!-- Top right sparkle -->
    <polygon points="20.5,5.5 20.9,7.2 22.5,7.5 20.9,7.8 20.5,9.5 20.1,7.8 18.5,7.5 20.1,7.2"/>
    <!-- Right sparkle -->
    <polygon points="22,10.5 22.3,11.7 23.5,12 22.3,12.3 22,13.5 21.7,12.3 20.5,12 21.7,11.7"/>
  </g>
</svg>
